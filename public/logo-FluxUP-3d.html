<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Sanctum — Dé 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #07080f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cinzel', serif;
  }

  /* ── ANIMATIONS ── */
  @keyframes de-color {
    0%   { filter: drop-shadow(0 0 6px rgba(124,58,237,0.9)) sepia(1) saturate(5) hue-rotate(220deg); }
    50%  { filter: drop-shadow(0 0 6px rgba(0,220,220,0.9))  sepia(1) saturate(5) hue-rotate(160deg); }
    100% { filter: drop-shadow(0 0 6px rgba(124,58,237,0.9)) sepia(1) saturate(5) hue-rotate(220deg); }
  }
  @keyframes de-3d {
    0%   { transform: rotateX(0deg)   rotateY(0deg); }
    25%  { transform: rotateX(90deg)  rotateY(-90deg); }
    50%  { transform: rotateX(180deg) rotateY(-180deg); }
    75%  { transform: rotateX(270deg) rotateY(-270deg); }
    100% { transform: rotateX(360deg) rotateY(-360deg); }
  }
  @keyframes logo-glow {
    0%,100% { text-shadow: 0 0 18px rgba(160,80,255,0.7), 0 0 40px rgba(160,80,255,0.3); }
    33%     { text-shadow: 0 0 18px rgba(0,210,255,0.7),  0 0 40px rgba(0,210,255,0.3); }
    66%     { text-shadow: 0 0 18px rgba(255,140,0,0.7),  0 0 40px rgba(255,140,0,0.3); }
  }
  @keyframes lspark1 { 0%{opacity:0;transform:translate(0,0) scale(1)} 5%{opacity:1} 30%{opacity:0;transform:translate(-22px,-38px) scale(0.2)} 100%{opacity:0} }
  @keyframes lspark2 { 0%{opacity:0;transform:translate(0,0) scale(1)} 5%{opacity:1} 30%{opacity:0;transform:translate(18px,-42px) scale(0.2)} 100%{opacity:0} }
  @keyframes lspark3 { 0%{opacity:0;transform:translate(0,0) scale(1)} 7%{opacity:1} 28%{opacity:0;transform:translate(28px,-22px) scale(0.2)} 100%{opacity:0} }
  @keyframes lspark4 { 0%{opacity:0;transform:translate(0,0) scale(1)} 6%{opacity:1} 25%{opacity:0;transform:translate(-16px,-20px) scale(0.2)} 100%{opacity:0} }
  @keyframes lspark5 { 0%{opacity:0;transform:translate(0,0) scale(1)} 4%{opacity:1} 22%{opacity:0;transform:translate(8px,-48px) scale(0.2)} 100%{opacity:0} }
  @keyframes lspark6 { 0%{opacity:0;transform:translate(0,0) scale(1)} 5%{opacity:1} 26%{opacity:0;transform:translate(-30px,-16px) scale(0.2)} 100%{opacity:0} }
  @keyframes lspark7 { 0%{opacity:0;transform:translate(0,0) scale(1)} 6%{opacity:1} 32%{opacity:0;transform:translate(24px,-34px) scale(0.2)} 100%{opacity:0} }

  /* ── WRAPPER ── */
  .nav-logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    position: relative;
    cursor: default;
    padding: 40px;
  }

  /* ── PARTICULES ── */
  .logo-sparks {
    position: absolute;
    top: 40px;
    left: 50%;
    width: 0;
    height: 0;
    pointer-events: none;
  }
  .logo-spark {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
  }
  .lspark1 { width:4px; height:4px; background:#fff9c4; top:14px; left:-2px; animation: lspark1 19s ease-out infinite; }
  .lspark2 { width:3px; height:3px; background:#ffd166; top:10px; left:2px;  animation: lspark2 19s ease-out infinite 0.15s; }
  .lspark3 { width:2px; height:2px; background:#ffe082; top:18px; left:-4px; animation: lspark3 19s ease-out infinite 0.3s; }
  .lspark4 { width:3px; height:3px; background:#fff9c4; top:12px; left:4px;  animation: lspark4 19s ease-out infinite 0.1s; }
  .lspark5 { width:2px; height:2px; background:#ffffff; top:8px;  left:0px;  animation: lspark5 19s ease-out infinite 0.4s; }
  .lspark6 { width:4px; height:4px; background:#f48c06; top:16px; left:-6px; animation: lspark6 19s ease-out infinite 0.05s; }
  .lspark7 { width:2px; height:2px; background:#ffd166; top:20px; left:6px;  animation: lspark7 19s ease-out infinite 0.25s; }

  /* ── DÉ 3D ── */
  .de-logo {
    display: inline-block;
    width: 42px;
    height: 42px;
    position: relative;
    transform-style: preserve-3d;
    animation: de-3d 4s linear infinite;
  }
  .de-logo .de-face {
    position: absolute;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    line-height: 1;
    backface-visibility: visible;
    animation: de-color 3s ease-in-out infinite;
  }
  .de-logo .de-front  { transform: translateZ(21px); animation: none; filter: invert(1) drop-shadow(0 0 5px rgba(255,255,255,0.7)); }
  .de-logo .de-back   { transform: rotateY(180deg) translateZ(21px); }
  .de-logo .de-right  { transform: rotateY(90deg)  translateZ(21px); }
  .de-logo .de-left   { transform: rotateY(-90deg) translateZ(21px); }
  .de-logo .de-top    { transform: rotateX(90deg)  translateZ(21px); }
  .de-logo .de-bottom { transform: rotateX(-90deg) translateZ(21px); }

  /* ── TEXTE ── */
  .logo-sanctum {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #ffffff;
    opacity: 0.9;
    animation: logo-glow 6s ease-in-out infinite;
  }

  /* ── VERSION GRANDE pour la démo ── */
  .demo-large .de-logo       { width: 90px; height: 90px; }
  .demo-large .de-logo .de-face { width: 90px; height: 90px; font-size: 72px; }
  .demo-large .de-logo .de-front  { transform: translateZ(45px); }
  .demo-large .de-logo .de-back   { transform: rotateY(180deg) translateZ(45px); }
  .demo-large .de-logo .de-right  { transform: rotateY(90deg)  translateZ(45px); }
  .demo-large .de-logo .de-left   { transform: rotateY(-90deg) translateZ(45px); }
  .demo-large .de-logo .de-top    { transform: rotateX(90deg)  translateZ(45px); }
  .demo-large .de-logo .de-bottom { transform: rotateX(-90deg) translateZ(45px); }
  .demo-large .logo-sanctum  { font-size: 14px; letter-spacing: 8px; }

  /* ── LABELS ── */
  .sizes {
    display: flex;
    gap: 80px;
    align-items: flex-end;
  }
  .size-label {
    color: rgba(255,209,102,0.3);
    font-size: 9px;
    letter-spacing: 3px;
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="sizes">

  <!-- Taille nav (42px) -->
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="perspective:120px;">
      <a class="nav-logo-wrap">
        <div class="logo-sparks">
          <div class="logo-spark lspark1"></div>
          <div class="logo-spark lspark2"></div>
          <div class="logo-spark lspark3"></div>
          <div class="logo-spark lspark4"></div>
          <div class="logo-spark lspark5"></div>
          <div class="logo-spark lspark6"></div>
          <div class="logo-spark lspark7"></div>
        </div>
        <span class="de-logo">
          <span class="de-face de-front">⚀</span>
          <span class="de-face de-back">⚅</span>
          <span class="de-face de-right">⚂</span>
          <span class="de-face de-left">⚃</span>
          <span class="de-face de-top">⚄</span>
          <span class="de-face de-bottom">⚁</span>
        </span>
        <span class="logo-sanctum">Sanctum</span>
      </a>
    </div>
    <p class="size-label">NAV — 42px</p>
  </div>

  <!-- Grande version (90px) -->
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div style="perspective:250px;">
      <a class="nav-logo-wrap demo-large">
        <div class="logo-sparks">
          <div class="logo-spark lspark1"></div>
          <div class="logo-spark lspark2"></div>
          <div class="logo-spark lspark3"></div>
          <div class="logo-spark lspark4"></div>
          <div class="logo-spark lspark5"></div>
          <div class="logo-spark lspark6"></div>
          <div class="logo-spark lspark7"></div>
        </div>
        <span class="de-logo">
          <span class="de-face de-front">⚀</span>
          <span class="de-face de-back">⚅</span>
          <span class="de-face de-right">⚂</span>
          <span class="de-face de-left">⚃</span>
          <span class="de-face de-top">⚄</span>
          <span class="de-face de-bottom">⚁</span>
        </span>
        <span class="logo-sanctum">Sanctum</span>
      </a>
    </div>
    <p class="size-label">LARGE — 90px</p>
  </div>

</div>

</body>
</html>
